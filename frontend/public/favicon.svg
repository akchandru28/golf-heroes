<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Glow -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#c8f135" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Main Ball -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" />
  <!-- Realistic Dimples -->
  <g fill="#bbbbbb" opacity="0.4">
    <circle cx="32" cy="32" r="3" />
    <circle cx="50" cy="22" r="3" />
    <circle cx="68" cy="32" r="3" />
    <circle cx="22" cy="50" r="3" />
    <circle cx="41" cy="45" r="3" />
    <circle cx="59" cy="45" r="3" />
    <circle cx="78" cy="50" r="3" />
    <circle cx="32" cy="68" r="3" />
    <circle cx="50" cy="78" r="3" />
    <circle cx="68" cy="68" r="3" />
    <circle cx="41" cy="58" r="3" />
    <circle cx="59" cy="58" r="3" />
  </g>
  <!-- Accent Ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#c8f135" stroke-width="2.5" />
</svg>
